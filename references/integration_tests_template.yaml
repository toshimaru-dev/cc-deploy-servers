# 結合試験定義テンプレート
# run_integration.sh --tests <このファイル> で使用する
# expect: reachable（到達できる）/ unreachable（遮断される）

- port: 22
  proto: tcp
  expect: reachable
  description: SSH（管理アクセス）

- port: 80
  proto: tcp
  expect: reachable
  description: HTTP

- port: 443
  proto: tcp
  expect: reachable
  description: HTTPS

- port: 8080
  proto: tcp
  expect: reachable
  description: アプリHTTP

